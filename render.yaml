services:
  - type: web
    name: hedge-analytics
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PEER_GROUPS_DIR
        value: /data
    disk:
      name: hedge-data
      mountPath: /data
      sizeGB: 1
